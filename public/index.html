<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Sidekick</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Iconify Icons -->
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>
  <!-- Mini orb mode -->
  <div class="mini-orb" id="mini-orb" style="display: none;">
    <img class="mini-orb-avatar" id="mini-orb-avatar" src="" alt="" />
    <div class="mini-pulse"></div>
  </div>

  <div class="widget-container" id="widget-container">
    <!-- Chat log -->
    <div class="chat-log" id="chat-log"></div>

    <!-- Status hint -->
    <div class="status-hint" id="status-hint"></div>

    <!-- Character area -->
    <div class="lobster-area" id="lobster-area">
      <canvas id="aura-canvas"></canvas>
      <div class="listening-pulse-ring hidden" id="listening-pulse-ring">
        <div class="ring-3"></div>
      </div>
      <canvas id="live2d-canvas"></canvas>
      <video id="video-avatar" class="video-avatar" autoplay loop muted playsinline></video>
      <canvas id="video-avatar-canvas"></canvas>
      <!-- Interaction hint tooltip (hover to reveal) -->
      <div class="interaction-hint" id="interaction-hint">
        <span class="iconify" data-icon="mdi:gesture-tap" style="font-size:14px;"></span>
        <span>Try clicking head or body!</span>
      </div>
      <!-- Avatar carousel bar -->
      <div class="avatar-carousel-bar" id="avatar-carousel-bar">
        <button class="carousel-arrow carousel-arrow-left" id="avatar-prev" title="Previous character">
          <span class="iconify" data-icon="mdi:chevron-left"></span>
        </button>
        <div class="carousel-center">
          <div class="avatar-name-label" id="avatar-name-label">Octavia</div>
          <div class="carousel-dots" id="carousel-dots"></div>
        </div>
        <button class="carousel-arrow carousel-arrow-right" id="avatar-next" title="Next character">
          <span class="iconify" data-icon="mdi:chevron-right"></span>
        </button>
      </div>
      <!-- Push to Talk button -->
      <div class="tap-hint" id="tap-hint">
        <span class="iconify tap-icon" data-icon="mdi:microphone"></span>
        <span class="tap-text">Push to Talk</span>
        <span class="tap-keycap" id="tap-keycap">Opt+Z</span>
      </div>
    </div>

    <!-- Drag bar (always visible, wraps fold toggle) -->
    <div class="drag-bar" title="Drag to move">
      <div class="drag-grip-line"></div>
      <button id="fold-toggle" class="fold-toggle" title="Text Me">
        <span class="iconify" data-icon="mdi:chevron-down"></span>
      </button>
      <div class="drag-grip-line"></div>
    </div>

    <!-- Foldable bottom panel -->
    <div class="bottom-panel" id="bottom-panel">
      <!-- Bottom bar -->
      <div class="bottom-bar">
        <div class="state-indicator" id="state-indicator">
          <span class="state-dot"></span>
          <span class="state-text" id="state-text">Type to start chatting</span>
        </div>
        <div class="widget-controls">
          <button id="tts-settings-btn" class="tiny-btn" title="Voice settings">
            <span class="iconify" data-icon="mdi:volume-high"></span>
          </button>
          <button id="global-settings-btn" class="tiny-btn" title="Global settings">
            <span class="iconify" data-icon="mdi:cog"></span>
          </button>
          <button id="minimize-btn" class="tiny-btn" title="Minimize">
            <span class="iconify" data-icon="mdi:minus"></span>
          </button>
          <button id="close-btn" class="tiny-btn close" title="Close">
            <span class="iconify" data-icon="mdi:close"></span>
          </button>
        </div>
      </div>

      <!-- Text input -->
      <div class="text-input-area" id="text-input-area">
        <input type="text" id="text-input" class="text-input" placeholder="Type a message..." />
        <button id="send-btn" class="send-btn" title="Send">
          <span class="iconify" data-icon="mdi:send"></span>
        </button>
      </div>
    </div>

    <!-- TTS Settings Panel (per-avatar voice) -->
    <div class="settings-panel" id="tts-settings-panel" style="display: none;">
      <div class="settings-panel-header">
        <span class="settings-panel-title">
          <span class="iconify" data-icon="mdi:volume-high" style="margin-right:4px"></span>
          Voice
          <span class="settings-avatar-tag" id="settings-avatar-tag"></span>
        </span>
        <button id="close-tts-settings" class="tiny-btn">
          <span class="iconify" data-icon="mdi:close"></span>
        </button>
      </div>
      <div class="settings-body" id="tts-settings-body">
        <div class="settings-section">
          <div class="settings-row">
            <span class="settings-label">Provider</span>
            <div class="settings-pills" id="settings-tts-pills">
              <button class="settings-pill active" data-provider="edge">Edge TTS</button>
              <button class="settings-pill" data-provider="minimax">MiniMax</button>
            </div>
          </div>
          <div class="settings-voice-list" id="settings-voice-list"></div>
        </div>
      </div>
      <button class="settings-done-btn" id="tts-settings-done">
        <span class="iconify" data-icon="mdi:check"></span> Done
      </button>
    </div>

    <!-- Global Settings Panel -->
    <div class="settings-panel" id="global-settings-panel" style="display: none;">
      <div class="settings-panel-header">
        <span class="settings-panel-title">
          <span class="iconify" data-icon="mdi:cog" style="margin-right:4px"></span>
          Settings
        </span>
        <button id="close-global-settings" class="tiny-btn">
          <span class="iconify" data-icon="mdi:close"></span>
        </button>
      </div>
      <div class="settings-body" id="global-settings-body">

        <!-- Speech Input Section -->
        <div class="settings-section">
          <div class="settings-section-header">
            <span class="iconify" data-icon="mdi:microphone"></span>
            <span>Speech Input</span>
          </div>
          <div class="settings-row">
            <span class="settings-label">Provider</span>
            <div class="settings-pills" id="settings-stt-pills">
              <button class="settings-pill active" data-stt="deepgram">Deepgram</button>
              <button class="settings-pill" data-stt="groq">Groq Whisper</button>
            </div>
          </div>
          <div class="settings-groq-options" id="settings-groq-options" style="display: none;">
            <div class="settings-row">
              <span class="settings-label">Model</span>
              <div class="settings-pills" id="settings-groq-model-pills">
                <button class="settings-pill active" data-model="whisper-large-v3-turbo">v3-turbo</button>
                <button class="settings-pill" data-model="whisper-large-v3">v3</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Push to Talk Section -->
        <div class="settings-section">
          <div class="settings-section-header">
            <span class="iconify" data-icon="mdi:keyboard"></span>
            <span>Push to Talk</span>
          </div>
          <div class="settings-row">
            <span class="settings-label">Current</span>
            <span class="settings-hotkey-badge" id="settings-hotkey-badge">Opt+Space</span>
          </div>
          <div class="settings-hotkey-capture" id="settings-hotkey-capture">
            <span class="iconify" id="settings-capture-icon" data-icon="mdi:circle-outline"></span>
            <span id="settings-capture-text">Tap to record new combo</span>
          </div>
          <div class="settings-preset-row">
            <button class="settings-preset-btn" data-combo='{"code":"fn"}'><span class="preset-keycap">Fn (hold)</span></button>
            <button class="settings-preset-btn" data-combo='{"alt":true,"code":"Space"}'><span class="preset-keycap">Opt+Space</span></button>
            <button class="settings-preset-btn" data-combo='{"alt":true,"code":"KeyZ"}'><span class="preset-keycap">Opt+Z</span></button>
            <button class="settings-preset-btn" data-combo='{"ctrl":true,"code":"Space"}'><span class="preset-keycap">Ctrl+Space</span></button>
            <button class="settings-preset-btn" data-combo='{"code":"F5"}'><span class="preset-keycap">F5</span></button>
          </div>
        </div>

        <!-- API Keys Section -->
        <div class="settings-section">
          <div class="settings-section-header">
            <span class="iconify" data-icon="mdi:key-variant"></span>
            <span>API Keys</span>
          </div>
          <div class="settings-key-group">
            <span class="settings-label">MiniMax</span>
            <div class="settings-key-input-row">
              <input type="password" class="settings-input" id="settings-minimax-key" placeholder="Enter API Key" />
              <button class="settings-key-save" id="settings-minimax-save">Save</button>
            </div>
            <div class="settings-key-status" id="settings-minimax-status"></div>
          </div>
          <div class="settings-key-group">
            <span class="settings-label">Groq</span>
            <div class="settings-key-input-row">
              <input type="password" class="settings-input" id="settings-groq-key" placeholder="Enter API Key" />
              <button class="settings-key-save" id="settings-groq-save">Save</button>
            </div>
            <div class="settings-key-status" id="settings-groq-status"></div>
          </div>
        </div>

        <!-- Connection Section -->
        <div class="settings-section">
          <div class="settings-section-header">
            <span class="iconify" data-icon="mdi:connection"></span>
            <span>Connection</span>
          </div>
          <div class="settings-connection-list" id="settings-connection-list">
            <div class="settings-connection-item active" data-connection="openclaw">
              <span class="connection-icon"><span class="iconify" data-icon="mdi:robot-outline"></span></span>
              <div class="connection-info">
                <div class="connection-name">OpenClaw</div>
                <div class="connection-desc">Clawdbot AI assistant</div>
              </div>
              <span class="connection-status connected">
                <span class="iconify" data-icon="mdi:check-circle"></span>
              </span>
            </div>
            <div class="settings-connection-item" data-connection="claude-code">
              <span class="connection-icon"><span class="iconify" data-icon="mdi:console"></span></span>
              <div class="connection-info">
                <div class="connection-name">Claude Code</div>
                <div class="connection-desc">Claude CLI assistant</div>
              </div>
              <span class="connection-status" id="claude-code-conn-status"></span>
            </div>
          </div>
          <div class="settings-claude-code-config" id="settings-claude-code-config" style="display: none;">
            <div class="settings-row">
              <span class="settings-label">CLI Path</span>
              <div class="settings-key-input-row">
                <input type="text" class="settings-input" id="claude-code-path" placeholder="claude (default)" />
                <button class="settings-key-save" id="claude-code-validate">Test</button>
              </div>
              <div class="settings-key-status" id="claude-code-status"></div>
            </div>
          </div>
        </div>

      </div>
      <button class="settings-done-btn" id="global-settings-done">
        <span class="iconify" data-icon="mdi:check"></span> Done
      </button>
    </div>
  </div>

  <!-- Live2D dependencies (load order matters: Cubism Core → PixiJS v6 → pixi-live2d-display) -->
  <script src="lib/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

  <script src="orb.js"></script>
  <script src="live2d.js"></script>
  <script src="app.js"></script>
</body>
</html>
